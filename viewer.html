<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Danoni Viewer - ITTN.EXE Web Archive</title>
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --accent: #00ffcc; --text: #f0f0f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Meiryo UI', sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        /* 左パネル: 譜面リスト & ズーム */
        #left-panel { width: 300px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 10; }
        .panel-header { padding: 15px; border-bottom: 1px solid #333; background: #222; }
        
        .ctrl-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.8em; color: #888; margin-bottom: 5px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--accent); }

        #song-list { flex: 1; overflow-y: auto; padding: 10px; }
        .year-group { margin-bottom: 20px; }
        .year-label { font-size: 0.8em; color: var(--accent); font-weight: bold; border-bottom: 1px solid #333; margin-bottom: 5px; padding-bottom: 2px; }
        
        .song-item { 
            padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 0.9em; 
            transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .song-item:hover { background: #333; }

        /* 中央メイン */
        #main-view { flex: 1; overflow-y: scroll; background: #000; display: flex; justify-content: center; position: relative; }
        #chart-area { position: relative; width: 320px; background: #080808; min-height: 100%; border-left: 1px solid #222; border-right: 1px solid #222; }
        #welcome-msg { position: absolute; top: 40%; width: 100%; text-align: center; color: #444; pointer-events: none; }

        /* ノーツ・フリーズ (JSから制御) */
        .note-container { 
            position: absolute; 
            width: 40px; 
            height: 40px; 
            z-index: 5; 
            pointer-events: none;
        }
        .frz-bar { 
            position: absolute; 
            width: 16px; 
            z-index: 2; 
            opacity: 0.6; 
            pointer-events: none;
            box-sizing: border-box;
        }

        /* 右パネル: ミニマップ */
        #right-panel { width: 80px; background: var(--panel); border-left: 1px solid #333; position: relative; }
        #minimap-canvas { width: 100%; height: 100%; }
        #view-indicator { 
            position: absolute; width: 100%; 
            background: rgba(0, 255, 204, 0.1); 
            border-top: 1px solid var(--accent); 
            border-bottom: 1px solid var(--accent); 
            pointer-events: none; 
        }
    </style>
</head>
<body>

<div id="left-panel">
    <div class="ctrl-group">
        <label>Zoom (Display Interval)</label>
        <input type="range" id="zoom-slider" min="1" max="10" step="0.1" value="5">
        <div id="zoom-val" style="text-align: right; font-size: 0.8em;">x5.0</div>
    </div>

    <div id="song-list" style="margin-top: 20px;"></div>
    
    <div id="difficulty-selector"></div>
    <div id="meta-list"></div>
</div>

<div id="main-view">
    <div id="chart-area">
        <div id="welcome-msg">
            <h2>K-AN DAN-ONI STEP VIEWER</h2>
            <p>左のリストから曲を選択してください</p>
        </div>
    </div>
</div>
<div id="right-panel">
    <canvas id="minimap-canvas"></canvas>
    <div id="view-indicator"></div>
</div>

<div id="right-panel">
    <canvas id="minimap-canvas"></canvas>
    <div id="view-indicator"></div>
</div>

<script src="viewer.js"></script>

<script>
    // window.onload で囲むことで、HTML要素が確実に生成された後に実行されるようにします
    window.onload = () => {
        const mainView = document.getElementById('main-view');
        const indicator = document.getElementById('view-indicator');
        const minimap = document.getElementById('minimap-canvas');

        // 要素が存在する場合のみイベントを設定（エラー防止）
        if (mainView && indicator) {
            mainView.addEventListener('scroll', () => {
                const scrollPercent = mainView.scrollTop / (mainView.scrollHeight - mainView.clientHeight);
                const viewPercent = mainView.clientHeight / mainView.scrollHeight;
                
                // ミニマップ上の表示位置を更新
                indicator.style.top = (scrollPercent * (100 - (viewPercent * 100))) + "%";
                indicator.style.height = (viewPercent * 100) + "%";
            });
        }

        // ミニマップクリックでスクロールさせる機能
        if (minimap && mainView) {
            minimap.onclick = (e) => {
                const rect = minimap.getBoundingClientRect();
                const ratio = (e.clientY - rect.top) / rect.height;
                mainView.scrollTop = ratio * mainView.scrollHeight - (mainView.clientHeight / 2);
            };
        }
    };
</script>

</body>
</html>
